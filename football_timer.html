<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>До футбола</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2ecc71;
    --dark: #0d1117;
    --card: #161b22;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(46,204,113,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(88,166,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .container {
    text-align: center;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
    max-width: 440px;
    width: 100%;
  }
  .title {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 36px;
  }
  .photo-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 32px;
  }
  .photo-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1.5px solid transparent;
    background: linear-gradient(135deg, var(--green), var(--accent)) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    opacity: 0.7;
    animation: spin 8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .photo-ring-2 {
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    border: 1px solid rgba(46,204,113,0.15);
    animation: spin 14s linear infinite reverse;
  }
  .photo {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .photo-wrap.talking .photo {
    animation: pulse-photo 0.4s ease-in-out infinite alternate;
  }
  @keyframes pulse-photo {
    from { transform: scale(1); box-shadow: 0 0 0 0 rgba(46,204,113,0.3); }
    to { transform: scale(1.03); box-shadow: 0 0 20px 6px rgba(46,204,113,0.15); }
  }
  .timer-block { margin-bottom: 12px; }
  .timer-label {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .timer-value {
    font-family: 'Unbounded', sans-serif;
    font-size: 38px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--green), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 4px;
  }
  .timer-sub { font-size: 12px; color: var(--muted); font-weight: 300; }
  .divider {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    margin: 24px auto;
  }
  .btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: 1.5px solid rgba(46,204,113,0.4);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 2px;
    padding: 14px 32px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .btn:hover { border-color: var(--green); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(46,204,113,0.15); }
  .btn:active { transform: translateY(0); }
  .btn.speaking { border-color: var(--green); animation: btn-glow 1s ease-in-out infinite alternate; }
  @keyframes btn-glow {
    from { box-shadow: 0 0 8px rgba(46,204,113,0.2); }
    to { box-shadow: 0 0 20px rgba(46,204,113,0.4); }
  }
  .waves {
    display: inline-flex; gap: 3px; align-items: center;
    height: 16px; margin-left: 6px; vertical-align: middle;
    opacity: 0; transition: opacity 0.3s;
  }
  .waves.active { opacity: 1; }
  .wave-bar { width: 3px; background: var(--green); border-radius: 2px; animation: wave 0.6s ease-in-out infinite alternate; }
  .wave-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
  .wave-bar:nth-child(2) { height: 12px; animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { height: 8px; animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { height: 14px; animation-delay: 0.05s; }
  .wave-bar:nth-child(5) { height: 6px; animation-delay: 0.15s; }
  @keyframes wave { from { transform: scaleY(1); } to { transform: scaleY(0.3); } }
  .speech {
    margin-top: 28px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 16px 20px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--muted);
    min-height: 60px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.4s ease;
    text-align: left;
  }
  .speech.visible { opacity: 1; transform: translateY(0); }
  .speech-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.2); margin-bottom: 6px; }
  .next-match { font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 20px; letter-spacing: 1px; }
  .next-match span { color: rgba(46,204,113,0.5); }
</style>
</head>

function getNextFriday(from) {
  const d = new Date(from);
  const day = d.getDay(); // 0=Sun, 5=Fri
  let daysUntilFriday = (5 - day + 7) % 7;
  if (daysUntilFriday === 0) {
    // Today is Friday — check if match time has passed
    const match = new Date(d);
    match.setHours(21, 30, 0, 0);
    if (d >= match) {
      daysUntilFriday = 7; // next Friday
    }
  }
  const next = new Date(d);
  next.setDate(d.getDate() + daysUntilFriday);
  next.setHours(21, 30, 0, 0);
  return next;
}

function updateTimer() {
  const now = new Date();
  const match = getNextFriday(now);
  const diff = match - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

  if (days === 0 && hours === 0 && mins <= 1) {
    document.getElementById('timerValue').textContent = 'СЕЙЧАС!';
    document.getElementById('timerSub').textContent = 'Матч уже начался!';
  } else if (days === 0) {
    document.getElementById('timerValue').textContent = hours + 'ч ' + mins + 'м';
    document.getElementById('timerSub').textContent = 'сегодня вечером!';
  } else {
    document.getElementById('timerValue').textContent = days + 'д ' + hours + 'ч';
    document.getElementById('timerSub').textContent = 'и ещё ' + mins + ' минут';
  }

  const opts = { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' };
  document.getElementById('matchDate').textContent = match.toLocaleDateString('ru-RU', opts);
}

let isSpeaking = false;

function speak() {
  if (isSpeaking) {
    window.speechSynthesis.cancel();
    stopSpeaking();
    return;
  }

  const now = new Date();
  const match = getNextFriday(now);
  const diff = match - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

  let timeText;
  if (days === 0 && hours === 0 && mins <= 5) {
    timeText = 'Матч вот-вот начнётся! Скорее включай!';
  } else if (days === 0) {
    timeText = 'Хм... сегодня пятница! До матча осталось ' + hours + ' ' + declHours(hours) + ' и ' + mins + ' минут. Уже скоро!';
  } else if (days === 1) {
    timeText = 'До матча остался всего один день... и ' + hours + ' ' + declHours(hours) + '.';
  } else {
    timeText = 'До следующего матча осталось ' + days + ' ' + declDays(days) + ' и ' + hours + ' ' + declHours(hours) + '.';
  }

  const fact = facts[Math.floor(Math.random() * facts.length)];
  const fullText = timeText + ' А пока послушай интересный факт. ' + fact;

  document.getElementById('speechText').textContent = fullText;
  document.getElementById('speech').classList.add('visible');

  const utter = new SpeechSynthesisUtterance(fullText);
  utter.lang = 'ru-RU';
  utter.rate = 0.87;
  utter.pitch = 1.2;
  utter.volume = 1;

  const voices = window.speechSynthesis.getVoices();
  const ruVoice = voices.find(v => v.lang === 'ru-RU') || voices.find(v => v.lang.startsWith('ru'));
  if (ruVoice) utter.voice = ruVoice;

  utter.onstart = startSpeaking;
  utter.onend = stopSpeaking;
  utter.onerror = stopSpeaking;

  isSpeaking = true;
  window.speechSynthesis.speak(utter);
}

function startSpeaking() {
  document.getElementById('photoWrap').classList.add('talking');
  document.getElementById('speakBtn').classList.add('speaking');
  document.getElementById('waves').classList.add('active');
  document.getElementById('btnText').textContent = 'Говорит...';
}

function stopSpeaking() {
  isSpeaking = false;
  document.getElementById('photoWrap').classList.remove('talking');
  document.getElementById('speakBtn').classList.remove('speaking');
  document.getElementById('waves').classList.remove('active');
  document.getElementById('btnText').textContent = 'Узнать';
}

function declDays(n) {
  if (n % 10 === 1 && n % 100 !== 11) return 'день';
  if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'дня';
  return 'дней';
}

function declHours(n) {
  if (n % 10 === 1 && n % 100 !== 11) return 'час';
  if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'часа';
  return 'часов';
}
