<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Football Timer</title>\n    <style>\n        body { font-family: Arial, sans-serif; text-align: center; }\n        #timer { font-size: 48px; }\n        img { width: 300px; height: auto; margin: 20px 0; }\n    </style>\n</head>\n<body>\n    <h1>Football Match Timer</h1>\n    <img src="football_image.jpg" alt="Football">\n    <div id="timer">00:00</div>\n    <button onclick="startTimer()">Start Timer</button>\n    <script>\n        let countdown;\n        let timerDisplay = document.getElementById('timer');\n        function startTimer() {\n            let time = 5400; // 1 hour 30 minutes in seconds\n            countdown = setInterval(() => {\n                let minutes = Math.floor(time / 60);\n                let seconds = time % 60;\n                if (seconds < 10) seconds = '0' + seconds;\n                timerDisplay.textContent = minutes + ':' + seconds;\n                if (time <= 0) {\n                    clearInterval(countdown);\n                    alert('Time is up!');\n                    let audio = new Audio('alert_sound.mp3');\n                    audio.play();\n                }\n                time--;\n            }, 1000);\n        }\n    </script>\n</body>\n</html>
