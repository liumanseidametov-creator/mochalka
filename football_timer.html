<!DOCTYPE html>
<html>
<head>
    <title>Football Timer</title>
</head>
<body>
    <h1>Current Date and Time (UTC)</h1>
    <p id="datetime">2026-02-27 16:22:42</p>

    <script>
        function updateTime() {
            const now = new Date();
            const utcDateTime = new Date(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), now.getUTCHours(), now.getUTCMinutes(), now.getUTCSeconds());
            document.getElementById('datetime').innerText = utcDateTime.toISOString().replace('T', ' ').substring(0, 19);
        }

        setInterval(updateTime, 1000);
        updateTime(); // initial call
    </script>
</body>
</html>
