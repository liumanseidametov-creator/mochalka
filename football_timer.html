<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Timer Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            animation: fadeIn 1s;
        }
        h1 {
            color: #333;
        }
        .timer {
            font-size: 2em;
            margin: 20px;
            color: #e67e22;
        }
        .fact {
            font-size: 1.2em;
            margin: 10px;
        }
        img {
            width: 200px;
            height: auto;
            border-radius: 10%;
            animation: zoomIn 2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
    </style>
</head>
<body>
    <h1>Football Timer</h1>
    <img src="https://example.com/edem_photo.jpg" alt="Edem's photo">
    <div class="timer" id="timer"></div>
    <div class="fact" id="fact"></div>

    <script>
        const matchDate = new Date("2026-03-03T21:30:00Z"); // next Friday at 21:30 UTC

        function updateTimer() {
            const now = new Date();
            const timeDiff = matchDate - now;
            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

            document.getElementById('timer').innerHTML = `Next Match in: ${days}d ${hours}h ${minutes}m ${seconds}s`;

            if (timeDiff < 0) {
                clearInterval(timerInterval);
                document.getElementById('timer').innerHTML = "Time's up!";
                speak('Time for the match!');
            }
        }

        function speak(message) {
            const utterance = new SpeechSynthesisUtterance(message);
            window.speechSynthesis.speak(utterance);
        }

        const facts = [
            "Did you know? Football is the most popular sport in the world!",
            "Fun Fact: The FIFA World Cup is held every four years.",
            "Interesting: The fastest red card in football history was shown just two seconds into a match!"
        ];
        document.getElementById('fact').innerHTML = facts[Math.floor(Math.random() * facts.length)];

        updateTimer();
        const timerInterval = setInterval(updateTimer, 1000);
    </script>
</body>
</html>
